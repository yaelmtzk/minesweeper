<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>Minesweeper</title>
	<link rel="stylesheet" href="assets/styles/main.css" />
	<script src="https://kit.fontawesome.com/3840c4ba5c.js" crossorigin="anonymous"></script>
</head>

<body onload="onInit()">
	<div class="top-section">
		<button 
			title="Dark/light mode" 
			class="dark-light-mode-btn" 
			onclick="toggleDarkMode()">
			<i class="fa-solid fa-circle-half-stroke"></i>
		</button>
	</div>

	<img class="logo" src="./assets/img/MineSweeper.svg" alt="minesweeper-logo">

	<div class="lives">Lives Left: <span>-</span></div>

	<div class="hints"></div>

	<div class="game-container">
		<div class="panel">
			<div class="mines-num">
				<i class="fa-solid fa-bomb"></i>
				<span></span>
				<i class="fa-regular fa-flag" style="color: rgb(237, 73, 86);"></i>
			</div>

			<button 
				class="reset-btn" 
				onclick="resetGame()"
				title="Restart">
				<i class="fa-regular fa-face-smile-beam"></i>
			</button>

			<div class="timer">
				<i class="fa-regular fa-clock"></i>
				<span>0000</span>
			</div>
		</div>

		<div class="board-container"></div>
	</div>

	<div class="bottom-btn-panel">

		<div class="levels"></div>

		<div class="btns-bottom-section">
			<button 
				class="safe-click" 
				onclick="showSafeClick()" 
				title="Safe click">
				<i class="fa-regular fa-hand-pointer"></i>
				<span>3</span>
			</button>

			<button 
				class="mine-exterminator" 
				onclick="mineExterminatorOn(this)"
				title="Mine exterminator">
				<i class="fa-solid fa-x"></i>
			</button>

			<button 
				class="mega-hint" 
				onclick="megaHint(this)" 
				title="Mega hint">
				<i class="fa-solid fa-wand-sparkles"></i>
			</button>			
		</div>
	</div>

	<div class="best-score">
		Best Level Score:
		<i class="fa-solid fa-star"></i>
		<span>99999</span>
	</div>

	<footer>
		<p>&copy; 2025 Yael Matzek. All rights reserved.</p>
	</footer>

	<script src="js/utils.js"></script>
	<script src="js/game.js"></script>
	<script src="js/mines.js"></script>
	<script src="js/hints.js"></script>


</body>

</html>
